{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация в Threads</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        .auth-form { margin-top: 50px; display: flex; flex-direction: column; gap: 15px; }
        .auth-form input {
            background: #1e1e1e; border: 1px solid #262626; padding: 12px;
            color: white; border-radius: 8px; width: 100%;
        }
        .errorlist { color: #ff3b30; list-style: none; padding: 0; font-size: 14px; }
    </style>
</head>
<body>
    <div class="main-container">
        <h1>Регистрация</h1>
        <form method="post" enctype="multipart/form-data" class="auth-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="post-btn" style="width: 100%; padding: 12px;">Создать аккаунт</button>
        </form>
        <p style="text-align: center; margin-top: 20px;">
            <a href="{% url 'login' %}" style="color: #777; text-decoration: none;">Уже есть аккаунт? Войти</a>
        </p>
    </div>
</body>
</html>
